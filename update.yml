name: 🔄 Actualizar datos diariamente

on:
  schedule:
    # Cada día a las 00:05 UTC (02:05 hora española)
    - cron: '5 0 * * *'
  # También permite lanzarlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          pip install pandas openpyxl requests numpy

      - name: 🔄 Generar datos actualizados
        run: python generate_data.py

      - name: 🏗️ Construir index.html con datos nuevos
        run: python build_app.py

      - name: 📤 Commit y push si hay cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json index.html
          git diff --staged --quiet || git commit -m "🔄 Datos actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
