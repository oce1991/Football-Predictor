name: Actualizar datos diariamente

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl requests numpy

      - name: Generar datos
        run: python generate_data.py

      - name: Build app
        run: python build_app.py

      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json index.html
          git diff --staged --quiet || git commit -m "Datos actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
